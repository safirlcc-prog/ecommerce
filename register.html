<!DOCTYPE html>
<html>
<head>
    <title>Register Page</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            background:white;
            width:350px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        .register-box h2{
            text-align:center;
            margin-bottom:20px;
        }

        .input-box{
            margin-bottom:15px;
        }

        .input-box label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:10px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#008cdd;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#4facfe;
        }
    </style>
</head>

<body>

    <div class="register-box">

        <h2>Create Account</h2>

        <form action="" method="POST">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" name="fullname" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn">Register</button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="#">Login</a>
        </div>

    </div>

</body>
</html>
