<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f1f3f6;
        }

        /* Navbar */

        .navbar{
            background:#2874f0;
            color:white;
            padding:15px 5%;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        .home-btn{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        /* Cart Container */

        .cart-container{
            width:90%;
            margin:30px auto;
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:20px;
        }

        /* Left Side */

        .cart-items{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        .cart-item{
            display:flex;
            gap:20px;
            border-bottom:1px solid #ddd;
            padding:20px 0;
            align-items:center;
        }

        .cart-item img{
            width:140px;
            height:140px;
            object-fit:cover;
            border-radius:10px;
        }

        .item-details{
            flex:1;
        }

        .item-details h2{
            margin-bottom:10px;
        }

        .price{
            color:green;
            font-size:22px;
            margin:10px 0;
        }

        .qty-box{
            display:flex;
            align-items:center;
            gap:10px;
            margin-top:10px;
        }

        .qty-btn{
            width:35px;
            height:35px;
            border:none;
            background:#2874f0;
            color:white;
            font-size:20px;
            cursor:pointer;
            border-radius:5px;
        }

        .remove-btn{
            margin-top:15px;
            background:red;
            color:white;
            border:none;
            padding:10px 18px;
            cursor:pointer;
            border-radius:5px;
        }

        /* Right Side */

        .price-box{
            background:white;
            padding:25px;
            border-radius:10px;
            height:fit-content;
        }

        .price-box h2{
            margin-bottom:20px;
            color:#555;
        }

        .price-row{
            display:flex;
            justify-content:space-between;
            margin:15px 0;
            font-size:18px;
        }

        .total{
            font-size:24px;
            font-weight:bold;
            color:green;
        }

        .checkout-btn{
            width:100%;
            padding:15px;
            margin-top:25px;
            background:#fb641b;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        .checkout-btn:hover{
            background:#e85a15;
        }

        /* Responsive */

        @media(max-width:768px){

            .cart-container{
                grid-template-columns:1fr;
            }

            .cart-item{
                flex-direction:column;
                text-align:center;
            }

        }

    </style>

</head>
<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">FlipShop</div>

        <a href="index.html" class="home-btn">
            Home
        </a>

    </div>

    <!-- Cart Section -->

    <div class="cart-container">

        <!-- Left -->

        <div class="cart-items">

            <h1>My Cart</h1>

            <!-- Product 1 -->

            <div class="cart-item">

                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500">

                <div class="item-details">

                    <h2>Nike Running Shoes</h2>

                    <p>Men Sports Shoes</p>

                    <div class="price">₹2999</div>

                    <div class="qty-box">

                        <button class="qty-btn">-</button>

                        <span>1</span>

                        <button class="qty-btn">+</button>

                    </div>

                    <button class="remove-btn">
                        Remove
                    </button>

                </div>

            </div>

            <!-- Product 2 -->

            <div class="cart-item">

                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500">

                <div class="item-details">

                    <h2>Smart Watch</h2>

                    <p>Bluetooth Calling Watch</p>

                    <div class="price">₹1499</div>

                    <div class="qty-box">

                        <button class="qty-btn">-</button>

                        <span>1</span>

                        <button class="qty-btn">+</button>

                    </div>

                    <button class="remove-btn">
                        Remove
                    </button>

                </div>

            </div>

        </div>

        <!-- Right -->

        <div class="price-box">

            <h2>PRICE DETAILS</h2>

            <div class="price-row">
                <span>Price (2 items)</span>
                <span>₹4498</span>
            </div>

            <div class="price-row">
                <span>Discount</span>
                <span style="color:green;">- ₹500</span>
            </div>

            <div class="price-row">
                <span>Delivery Charges</span>
                <span style="color:green;">FREE</span>
            </div>

            <hr>

            <div class="price-row total">
                <span>Total Amount</span>
                <span>₹3998</span>
            </div>

            <button class="checkout-btn">
                PLACE ORDER
            </button>

        </div>

    </div>

</body>
</html>
