<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Cart UI</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#e3f2fd,#f5f5f5);
}

/* MAIN WRAPPER */
.wrapper{
    width:90%;
    margin:30px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

/* CART CARD */
.cart{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.title{
    font-size:24px;
    margin-bottom:20px;
}

/* ITEM CARD */
.item{
    display:flex;
    gap:15px;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    background:#fafafa;
    align-items:center;
}

.item img{
    width:120px;
    height:120px;
    border-radius:12px;
    object-fit:cover;
}

/* DETAILS */
.details{
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.price{
    color:#2e7d32;
    font-size:18px;
    margin:5px 0;
}

/* QTY */
.qty-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.btn{
    width:32px;
    height:32px;
    border:none;
    background:#1976d2;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

.remove{
    margin-top:10px;
    background:#e53935;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

/* SUMMARY CARD */
.summary{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    height:fit-content;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
}

.total{
    font-size:20px;
    font-weight:bold;
    color:#2e7d32;
}

.checkout{
    width:100%;
    padding:12px;
    background:#ff6f00;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
}

/* MOBILE */
@media(max-width:768px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .item{
        flex-direction:column;
        text-align:center;
    }

    .item img{
        width:180px;
        height:180px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- CART -->
    <div class="cart">

        <div class="title">🛒 My Cart</div>

        <!-- ITEM 1 -->
        <div class="item" data-price="2999">

            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500">

            <div class="details">

                <div class="name">Nike Shoes</div>
                <div class="price">₹2999</div>

                <div class="qty-box">
                    <button class="btn minus">-</button>
                    <span class="qty">1</span>
                    <button class="btn plus">+</button>
                </div>

                <button class="remove">Remove</button>
            </div>

        </div>

        <!-- ITEM 2 -->
        <div class="item" data-price="1499">

            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500">

            <div class="details">

                <div class="name">Smart Watch</div>
                <div class="price">₹1499</div>

                <div class="qty-box">
                    <button class="btn minus">-</button>
                    <span class="qty">1</span>
                    <button class="btn plus">+</button>
                </div>

                <button class="remove">Remove</button>
            </div>

        </div>

    </div>

    <!-- SUMMARY -->
    <div class="summary">

        <h2>Price Summary</h2>

        <div class="row">
            <span>Items Total</span>
            <span id="total">0</span>
        </div>

        <div class="row">
            <span>Discount</span>
            <span>- ₹300</span>
        </div>

        <div class="row">
            <span>Delivery</span>
            <span>FREE</span>
        </div>

        <hr>

        <div class="row total">
            <span>Total</span>
            <span id="final">0</span>
        </div>

        <button class="checkout">Checkout</button>

    </div>

</div>

<script>

function update(){

    let total = 0;

    document.querySelectorAll('.item').forEach(item=>{
        let price = parseInt(item.dataset.price);
        let qty = parseInt(item.querySelector('.qty').innerText);
        total += price * qty;
    });

    document.getElementById('total').innerText = "₹" + total;
    document.getElementById('final').innerText = "₹" + (total - 300);
}

document.querySelectorAll('.plus').forEach(btn=>{
    btn.onclick = () => {
        let q = btn.parentElement.querySelector('.qty');
        q.innerText = parseInt(q.innerText) + 1;
        update();
    }
});

document.querySelectorAll('.minus').forEach(btn=>{
    btn.onclick = () => {
        let q = btn.parentElement.querySelector('.qty');
        if(q.innerText > 1){
            q.innerText--;
            update();
        }
    }
});

document.querySelectorAll('.remove').forEach(btn=>{
    btn.onclick = () => {
        btn.closest('.item').remove();
        update();
    }
});

update();

</script>

</body>
</html>
